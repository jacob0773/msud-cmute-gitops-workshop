apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-do
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: <YOUR_ACTUAL_EMAIL_ADDRESS>
    privateKeySecretRef:
      name: letsencrypt-do
    solvers:
      - dns01:
          digitalocean:
            tokenSecretRef:
              name: digitalocean-dns
              key: access-token