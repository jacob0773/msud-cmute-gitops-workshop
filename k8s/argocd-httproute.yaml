apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-route
  namespace: argocd
spec:
  parentRefs:
    - name: paper-gateway
      namespace: paper
      sectionName: argocd-https
  hostnames:
    - argocd.jacob.mc.labs.cmute.cloud
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
