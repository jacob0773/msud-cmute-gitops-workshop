apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: paper-tls
spec:
  # Replace <YOUR_GITHUB_USERNAME> with the same value used in your DNS record.
  # Note: Minecraft is plain TCP and does not consume this cert. It is here
  # to demonstrate the cert-manager + DNS-01 flow end to end.
  secretName: paper-tls
  dnsNames:
    - jacob0773.mc.labs.cmute.cloud
  issuerRef:
    name: letsencrypt-do
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls
spec:
  # Replace <YOUR_GITHUB_USERNAME>. This cert IS used by the Gateway's HTTPS listener
  # to terminate TLS for the ArgoCD UI.
  secretName: argocd-tls
  dnsNames:
    - argocd.jacob0773.mc.labs.cmute.cloud
  issuerRef:
    name: letsencrypt-do
    kind: ClusterIssuer
